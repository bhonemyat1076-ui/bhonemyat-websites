<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rocks Paper Scissor</title>
    <style>
        body {
            background-color: rgb(25, 25, 25);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-size: 20px;
        }

        .player-move {
            width: 150px;
            height: 150px;
            background-color: transparent;
            border: 3px solid white;
            border-radius: 50%;
        }

        .obj-img {
            width: 100px;
            height: 100px;
        }

        .reset-score {
            font-weight: bold;
            padding: 11px 15px;
            background-color: green;
            border-radius: 5px;
            border: 1px solid white;
            color: aliceblue;
            font-size: 1rem;
        }
    </style>
</head>

<body>
    <h2>Rock Paper Scissors Game</h2>
    <br>
    <div id="button-box">
        <button class="player-move" onclick="playerPick('rock')">
            <img class="obj-img" src="./images/rock-emoji.png" alt="rock"></button>
        <button class="player-move" onclick="playerPick('paper')">
            <img class="obj-img" src="./images/paper-emoji.png" alt="paper"></button>
        <button class="player-move" onclick="playerPick('scissors')">
            <img class="obj-img" src="./images/scissors-emoji.png" alt="sissors"></button>
    </div>
    <br>
    <p id="both-pick"></p>
    <p id="result"></p>
    <p class="player-score">Wins: 0, Losses: 0, Draw: 0</p>
    <button class="reset-score" onclick="resetScore()">Reset Score</button>
    <script>
        const score = {
            wins: 0,
            losses: 0,
            draws: 0,
        }


        let computerChoice = '';
        function computerPick() {
            let randomNumber = Math.random();
            if (randomNumber >= 0 && randomNumber < 1 / 3) {
                computerChoice = "rock"
            }
            else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
                computerChoice = "paper"
            }
            else if (randomNumber >= 2 / 3 && randomNumber < 1) {
                computerChoice = "scissors"
            }
            return computerChoice;
        }
        function playerPick(playerChoice) {
            computerPick();
            let result = "";
            if (playerChoice === computerChoice) {
                result = 'draw';
                document.getElementById('result').innerHTML = 'Draw.';
                score.draws += 1;
            }
            else if (playerChoice === 'rock' && computerChoice === 'scissors' ||
                playerChoice === 'paper' && computerChoice === 'rock' ||
                playerChoice === 'scissors' && computerChoice === 'paper'
            ) {
                result = 'win';
                document.getElementById('result').innerHTML = `You ${result}.`;
                score.wins += 1;
            }
            else {
                result = 'lose'
                document.getElementById('result').innerHTML = `You ${result}.`;
                score.losses += 1;
            }

            document.getElementById('both-pick')
                .innerHTML = `You pick:<img class="obj-img" src="./images/${playerChoice}-emoji.png" alt="${playerChoice}"> 
             <img class="obj-img" src="./images/${computerChoice}-emoji.png" alt="${computerChoice}">:Computer pick`;
            document.querySelector('.player-score')
                .innerHTML = `Wins: ${score.wins},Losses: ${score.losses},Draw: ${score.draws}`;

            updateScore();
        }
        function resetScore() {
            score.wins = 0;
            score.losses = 0;
            score.draws = 0;
            updateScore();
        }
        function updateScore() {
            document.querySelector('.player-score')
                .innerHTML = `Wins: ${score.wins},Losses: ${score.losses},Draw: ${score.draws}`;
        }


    </script>
</body>

</html>
