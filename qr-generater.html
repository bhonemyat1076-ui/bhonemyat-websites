<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: black;
            flex-direction: column;
        }

        .container {
            background-color: rgb(87, 141, 137);
            color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            width: 300px;
            border: 2px solid black;
            border-radius: 20px;
        }

        #qr-code {
            width: 200px;
            height: 200px;
            border: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            margin: 15px;
        }

        button {
            padding: 10px 15px;
            background-color: rgb(81, 117, 25);
            border: 2px solid black;
            border-radius: 5px;
            font-size: 15px;
            margin: 15px;
        }

        #text-input {
            padding: 10px 15px;
            margin: 15px;
            border: 2px solid black;
            border-radius: 5px;
            font-size: 15px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>QR Code Generator</h2>
        <input id="text-input" type="text" placeholder="Enter here" onkeydown="">
        <button onclick="generateQr()">Generate</button>
        <div id="qr-code"></div>
    </div>

    <script>
        const inputText = document.getElementById('text-input');
        function generateQr() {
            const result = inputText.value;
            document.getElementById('qr-code')
                .innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${result}" alt="qr-code">`
                 return;
        }
    </script>
</body>

</html>
